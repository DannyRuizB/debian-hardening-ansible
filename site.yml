---
# Baseline hardening for a fresh Debian 12/13 server.
# Mirrors the steps of the harden.sh script, but declarative and idempotent.
- name: Harden Debian baseline
  hosts: debian_servers
  become: true

  roles:
    # Order matters: create the admin user + key BEFORE locking down SSH,
    # so the ssh_hardening lockout guard can find a usable key.
    - admin_user
    - ssh_hardening
    - ufw
    - fail2ban
    - unattended_upgrades
    - sysctl_hardening
    - account_policies
    - mount_options
    - banners
    - sudo_hardening
    - ssh_policies
    - coredump_limits
    - umask_tmout
    - cron_restrictions
    - password_policy
    - aide
    - rkhunter
    - module_blacklist
    - faillock
    - file_permissions
    - ssh_access
