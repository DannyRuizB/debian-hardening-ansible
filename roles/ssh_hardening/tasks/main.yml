---
# --- Lockout guard ---------------------------------------------------------
# Before disabling password auth, confirm the key owner actually has a key,
# so a typo or missing key can never lock us out over SSH.
# In check mode the key owner may not really exist yet (the admin_user role
# doesn't create anything under --check), so a missing account is expected
# there and just means "no key found"; on a real run it stays a hard error.
- name: Look up the key owner's home directory
  ansible.builtin.getent:
    database: passwd
    key: "{{ ssh_hardening_key_owner }}"
  register: ssh_hardening_key_owner_lookup
  failed_when:
    - ssh_hardening_key_owner_lookup.msg is defined
    - not ansible_check_mode

- name: Check for an authorized_keys file
  ansible.builtin.stat:
    path: "{{ ansible_facts.getent_passwd[ssh_hardening_key_owner][4] }}/.ssh/authorized_keys"
  register: ssh_hardening_authorized_keys
  when: ansible_facts.getent_passwd[ssh_hardening_key_owner] is defined

- name: Decide whether password auth can be safely disabled
  ansible.builtin.set_fact:
    ssh_hardening_password_auth: >-
      {{ 'no'
         if (ssh_hardening_disable_password
             and (((ssh_hardening_authorized_keys.stat.exists | default(false))
                   and (ssh_hardening_authorized_keys.stat.size | default(0)) > 0)
                  or ssh_hardening_force_no_password))
         else 'yes' }}

- name: Warn that password auth stays enabled to avoid a lockout
  ansible.builtin.debug:
    msg: >-
      No usable authorized_keys for '{{ ssh_hardening_key_owner }}'. Keeping
      PasswordAuthentication ENABLED. Add a key (or set
      ssh_hardening_force_no_password=true with console access) and re-run.
  when:
    - ssh_hardening_disable_password
    - ssh_hardening_password_auth == 'yes'

# --- Apply config ----------------------------------------------------------
# 'validate' runs `sshd -t` on the rendered file BEFORE it replaces the live
# drop-in. A broken config is rejected, so we never reload an unparseable sshd.
- name: Deploy SSH hardening drop-in
  ansible.builtin.template:
    src: 99-hardening.conf.j2
    dest: /etc/ssh/sshd_config.d/99-hardening.conf
    owner: root
    group: root
    mode: "0644"
    validate: "sshd -t -f %s"
  notify: Reload ssh
