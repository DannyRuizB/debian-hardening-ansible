---
# SSH port to listen on / protect. Inherits the shared ssh_port (group_vars).
ssh_hardening_port: "{{ ssh_port | default(22) }}"

# "no" disallows root SSH login entirely.
ssh_hardening_permit_root_login: "no"

# Move to key-only authentication. The lockout guard in tasks/main.yml keeps
# password auth ENABLED if it can't find an authorized_keys file, so a missing
# key never locks you out — unless you override it below.
ssh_hardening_disable_password: true

# DANGEROUS: disable password auth even when no key is found.
# Only set true when you have console access to recover.
ssh_hardening_force_no_password: false

# Account whose authorized_keys proves you won't be locked out.
# Defaults to the user Ansible connects as.
ssh_hardening_key_owner: "{{ ansible_user | default('root') }}"

# CIS-style extra hardening. Sensible defaults; override per host if needed.
ssh_hardening_max_auth_tries: 4        # fewer guesses per connection (CIS: <= 4)
ssh_hardening_x11_forwarding: "no"     # no GUI tunnelling unless you need it
ssh_hardening_login_grace_time: 60     # seconds to authenticate before drop
ssh_hardening_client_alive_interval: 300  # idle-session timeout (0 = disabled)
ssh_hardening_client_alive_count_max: 3
