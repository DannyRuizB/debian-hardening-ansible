---
- name: Install fail2ban
  ansible.builtin.apt:
    name: fail2ban
    state: present
    update_cache: true
    cache_valid_time: 3600
  register: fail2ban_pkg

# In check mode the package isn't really installed above: /etc/fail2ban
# doesn't exist for the template to land in, the service unit isn't there to
# manage, and the template's notify would fire a restart of that missing
# unit. Skip only in that exact case (same guard as the unattended_upgrades
# role); a real run installs the package first and configures it normally.
- name: Configure and start fail2ban
  when: not (ansible_check_mode and fail2ban_pkg.changed)
  block:
    - name: Deploy sshd jail
      ansible.builtin.template:
        src: jail.local.j2
        dest: /etc/fail2ban/jail.local
        owner: root
        group: root
        mode: "0644"
      notify: Restart fail2ban

    - name: Ensure fail2ban is enabled and running
      ansible.builtin.systemd:
        name: fail2ban
        enabled: true
        state: started
