---
# The whole role is a no-op unless an admin_user is requested.
- name: Manage the admin user
  when: admin_user | length > 0
  block:
    - name: Create admin user with sudo membership
      ansible.builtin.user:
        name: "{{ admin_user }}"
        groups: sudo
        append: true        # add to sudo without dropping existing groups
        shell: /bin/bash
        state: present

    - name: Install the admin user's SSH public key
      ansible.posix.authorized_key:
        user: "{{ admin_user }}"
        key: "{{ admin_pubkey }}"
        state: present
      when: admin_pubkey | length > 0
