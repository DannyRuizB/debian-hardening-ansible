---
# The whole role is a no-op unless an admin user is requested.
- name: Manage the admin user
  when: admin_user_name | length > 0
  block:
    - name: Create admin user with sudo membership
      ansible.builtin.user:
        name: "{{ admin_user_name }}"
        groups: sudo
        append: true        # add to sudo without dropping existing groups
        shell: /bin/bash
        state: present

    - name: Install the admin user's SSH public key
      ansible.posix.authorized_key:
        user: "{{ admin_user_name }}"
        key: "{{ admin_user_pubkey }}"
        state: present
      when: admin_user_pubkey | length > 0

    # Without this the user is in the 'sudo' group but has no password, so they
    # can't actually escalate. The sudoers module validates with visudo before
    # writing, so a bad rule can never break sudo on the host.
    - name: Grant the admin user passwordless sudo
      community.general.sudoers:
        name: "{{ admin_user_name }}"
        user: "{{ admin_user_name }}"
        commands: ALL
        nopassword: true
        state: present
      when: admin_user_passwordless_sudo
