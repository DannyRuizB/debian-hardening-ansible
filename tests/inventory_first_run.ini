# e2e test, FIRST run: the node is a fresh server — only root exists, so
# Ansible connects as root with the CI key (like a newly provisioned VPS).
[debian_servers]
node ansible_host=127.0.0.1 ansible_port=2222 ansible_user=root

[debian_servers:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_private_key_file={{ inventory_dir }}/.ssh_ci/id_ci
ansible_ssh_common_args=-o StrictHostKeyChecking=accept-new -o UserKnownHostsFile={{ inventory_dir }}/.ssh_ci/known_hosts
