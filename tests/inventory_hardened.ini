# e2e test, AFTER hardening: root SSH is now disabled, so Ansible connects as
# the admin user the playbook created — proving the handover actually works.
[debian_servers]
node ansible_host=127.0.0.1 ansible_port=2222 ansible_user=opsadmin

[debian_servers:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_private_key_file={{ inventory_dir }}/.ssh_ci/id_ci
ansible_ssh_common_args=-o StrictHostKeyChecking=accept-new -o UserKnownHostsFile={{ inventory_dir }}/.ssh_ci/known_hosts
