# Point this at the Debian server(s) you want to harden.
# Edit ansible_host / ansible_user to match your machine, then run:
#   ansible-playbook site.yml --check     # dry-run, changes nothing
#   ansible-playbook site.yml             # apply

[debian_servers]
testvm ansible_host=203.0.113.10 ansible_user=youruser

[debian_servers:vars]
ansible_python_interpreter=/usr/bin/python3
