# Dependabot config — opens weekly PRs to keep the GitHub Actions used in CI
# (checkout, setup-python) current. No npm/pip manifest is committed, so only
# the actions ecosystem is tracked.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
