[defaults]
inventory       = inventory.ini
roles_path      = roles
# Human-readable task output (shows multi-line diffs nicely).
# Use the built-in default callback with YAML formatting: the standalone
# community.general.yaml callback was removed in community.general 12.0.0.
stdout_callback = default
result_format   = yaml

# Lab convenience: skip the interactive host-key prompt on first connect.
# On real infrastructure, drop this and manage known_hosts properly.
host_key_checking = False

[privilege_escalation]
# All hosts are managed as a normal user that escalates with sudo.
become = True
